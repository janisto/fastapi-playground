name: App linting, typing, tests and coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.14'
          enable-cache: true

      - name: Set up just
        uses: extractions/setup-just@v4.0.0

      - name: Install dependencies
        run: just install

      - name: Install Functions dependencies
        run: uv sync --project functions --locked

      - name: Run linting checks
        run: just lint

      - name: Run typing checks
        run: just typing

      - name: Run Functions typing checks
        run: just typing-functions

      - name: Verify Functions deployment requirements
        run: just check-functions-requirements

      - name: Run Functions tests
        run: just test-functions

      - name: Run test coverage
        run: just cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-report
          path: htmlcov
