# Auto-label PRs based on changed file paths
# Docs: https://github.com/actions/labeler

# Application code
app:
  - changed-files:
      - any-glob-to-any-file: 'app/**'

tests:
  - changed-files:
      - any-glob-to-any-file: 'tests/**'

functions:
  - changed-files:
      - any-glob-to-any-file: 'functions/**'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '.agents/**/*.md'
          - 'AGENTS.md'
          - 'functions/README.md'
          - 'README.md'
          - 'GCP.md'

tooling:
  - changed-files:
      - any-glob-to-any-file:
          - '.python-version'
          - '.dockerignore'
          - 'Dockerfile'
          - 'Justfile'
          - 'firebase.json'
          - 'pyproject.toml'
          - 'uv.lock'
          - 'functions/pyproject.toml'
          - 'functions/uv.lock'

github-actions:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/dependabot.yml'

feature:
  - head-branch: ['^feature', 'feature']

bug:
  - head-branch: ['^bug', 'bug']

improvement:
  - head-branch: ['^improve', 'improve', 'improvement']
